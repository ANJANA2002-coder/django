

<!DOCTYPE html>
<html>
<head>
    {% load static %}
    <title>Gallery</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

<h1>My Image Gallery</h1>

<div class="gallery">

    <div class="card">
        <img src="{% static 'img.png' %}" alt="Image 1">
        <p>Image 1</p>
    </div>

    <div class="card">
        <img src="{% static 'img2.png' %}" alt="Image 2">
        <p>Image 2</p>
    </div>

    <div class="card">
        <img src="{% static 'img3.png' %}" alt="Image 3">
        <p>Image 3</p>
    </div>

</div>

</body>
</html>
